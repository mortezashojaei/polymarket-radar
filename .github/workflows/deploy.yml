name: build-and-deploy

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/polymarket-radar:latest

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            mkdir -p /opt/polymarket-radar/data
            cd /opt/polymarket-radar

            cat > .env << 'EOF'
            TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
            TELEGRAM_CHANNEL_ID=${{ vars.TELEGRAM_CHANNEL_ID }}
            RUN_EVERY_MINUTES=${{ vars.RUN_EVERY_MINUTES }}
            MIN_LIQUIDITY=${{ vars.MIN_LIQUIDITY }}
            MIN_VOLUME_24H=${{ vars.MIN_VOLUME_24H }}
            MIN_ODDS_SWING=${{ vars.MIN_ODDS_SWING }}
            TOP_SIGNALS=${{ vars.TOP_SIGNALS }}
            DATABASE_PATH=./data/radar.db
            POLYMARKET_EVENTS_URL=${{ vars.POLYMARKET_EVENTS_URL }}
            EOF

            docker compose pull
            docker compose up -d
            docker image prune -f
